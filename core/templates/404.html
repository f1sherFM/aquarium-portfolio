{% extends 'base.html' %}

{% block title %}{{ page.error_404.title }}{% endblock %}

{% block content %}
<section class="error-panel">
    <div class="error-code">{{ page.error_404.code }}</div>
    <p class="eyebrow">{{ page.error_404.eyebrow }}</p>
    <h1>{{ page.error_404.heading }}</h1>
    <p class="error-description">{{ page.error_404.description }}</p>

    <div class="hero-buttons">
        <a href="{% url 'home' %}" class="btn btn-primary">{{ site.error.back_home }}</a>
        <a href="{% url 'projects' %}" class="btn btn-secondary">{{ site.error.to_projects }}</a>
    </div>
</section>
{% endblock %}
